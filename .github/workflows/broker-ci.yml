name: Broker CI

on:
  push:
    paths:
      - "broker/**"
      - ".github/workflows/broker-ci.yml"
  pull_request:
    paths:
      - "broker/**"
      - ".github/workflows/broker-ci.yml"

permissions:
  contents: read

jobs:
  broker-test:
    name: Broker Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: broker
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: broker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check broker
        run: npm run typecheck

      - name: Build broker
        run: npm run build

      - name: Run tests
        run: npm test
